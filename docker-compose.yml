# ──────────────────────────────────────────────
# Docker Compose — Orquesta múltiples contenedores
# ──────────────────────────────────────────────
# 📚 Define los "servicios" (contenedores) que componen tu aplicación.
# Con un solo comando (docker compose up) levanta Django + PostgreSQL
# conectados entre sí en una red privada.

services:
  # ── Base de datos PostgreSQL ──
  db:
    image: postgres:16-alpine # Imagen oficial de PostgreSQL 16 (versión liviana)
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data # 📚 Persiste los datos entre reinicios
    environment:
      POSTGRES_DB: plutus # Nombre de la BD que se crea automáticamente
      POSTGRES_USER: plutus # Usuario de la BD
      POSTGRES_PASSWORD: plutus # Contraseña (en prod usa secrets, no hardcodees)
    ports:
      - "3434:5432" # Usa 3434 externo porque 5432 puede estar ocupado por Postgres local
    healthcheck: # Docker verifica que PostgreSQL esté listo
      test: ["CMD-SHELL", "pg_isready -U plutus"]
      interval: 5s
      timeout: 5s
      retries: 5


# 📚 Volumes con nombre — Docker los maneja, persisten entre reinicios
volumes:
  postgres_data:
